# Olive Young Global brand allowlist
#
# Pulled from /display/category/product-data/?ctgrNo=Skincare on 2026-05-11.
# brand_no values are stable internal IDs; brand names may shift in casing/
# punctuation as OY updates their site, so prefer brand_no for lookups.
#
# is_lg = true means LG H&H corporate ownership. Editorial decision:
#   - PHYSIOGEL: LG H&H Korea-Asia license-acquired brand. Public.
#   - CAREPLUS: LG H&H mass-market K-Beauty brand. Public.
#   - BEYOND: LG H&H mid-tier K-Beauty brand. Public.
#
# Competitor brands we include for the "honest competitor mix" angle:
# the top-volume indie K-Beauty brands on OY Global. Adding them keeps the
# dashboard's competitive-recommendation surface meaningful (Yangcho's
# friction analysis can match these honestly when they're a better fit
# than any LG product).
#
# Format consumed by pipeline/ingestion/catalog.py and the brand-filter
# logic in the orchestrator's product-matching step (W3+).

