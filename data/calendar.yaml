    date_pattern: "two consecutive weekends in mid-April"
    confidence: high
    friction_hints:
      - "desert UV + low humidity + dust"
      - "12+ hour days outdoors"
      - "makeup melt at peak afternoon heat"
      - "post-festival skin barrier repair (next-day TikTok content)"
    keywords: [Coachella, festival, desert, UV, festival fashion]

  - name: "Electric Daisy Carnival (EDC) Las Vegas"
    date_pattern: "third weekend of May"
    confidence: high
    friction_hints:
      - "Las Vegas late-May heat; nighttime event but hot pre-game"
      - "rave makeup with glitter, gems, body paint — long-wear matters"
    keywords: [EDC, festival, rave, Las Vegas]

  - name: "Lollapalooza Chicago"
    date_pattern: "first weekend of August"
    confidence: high
    friction_hints:
      - "Chicago humid summer; risk of pop-up thunderstorms"
      - "4 days of consecutive outdoor exposure"
    keywords: [Lollapalooza, festival, Chicago, summer]

  - name: "Bonnaroo (Manchester, TN)"
    date_pattern: "second weekend of June"
    confidence: high
    friction_hints:
      - "camping festival; multi-day outdoor with limited shower access"
      - "Tennessee summer heat + farm-environment dust"
    keywords: [Bonnaroo, festival, camping, summer]

