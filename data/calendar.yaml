# Cultural Calendar — always-on lifestyle moments
#
# Pure data, no R&D required. Used by pipeline/ingestion/calendar.py to inject
# moments into the daily run regardless of whether TikTok produces
# usable signal. This is the "graceful degradation" floor — the dashboard
# always has SOMETHING to talk about.
#
# Confidence tag conventions:
#   high     — dates verified from official source (league schedule, race calendar)
#   medium   — date pattern is reliable (e.g., "third week of August every year")
#              but the exact day shifts; verify before each application season
#   low      — placeholder; absolutely needs verification before use
#
# Friction hints are a starting point for the AI to reason from; the friction
# analyzer is free to ignore or refine them.

version: 1
last_reviewed: 2026-05-10  # bump when entries are spot-checked
notes: |
  Tony populated this from training-data recall on 2026-05-10. Every
  `confidence: low` and `confidence: medium` entry needs a 5-minute
  verification pass before the pipeline ships. `confidence: high` entries
  are mechanically reliable (league/race schedules) but always re-verify
  the year before relying on them.

# ─────────────────────────────────────────────────────────────────────────────
# NFL — Sunday Tailgate moments. Z-gen sports culture overlap is the wedge.
# Source for verification: nfl.com/schedules
# ─────────────────────────────────────────────────────────────────────────────

nfl:
  - name: "NFL Season Opener — Thursday Night Football"
    date_pattern: "first Thursday after Labor Day"
    confidence: high
    friction_hints:
      - "8 PM ET kickoff in early September; outdoor pre-game tailgating"
      - "regional weather extremes (Florida humidity, Buffalo cold)"
    keywords: [tailgate, NFL, kickoff, opening night]

  - name: "Sunday Tailgate (regular season, weeks 1–18)"
    date_pattern: "Sundays September through early January"
    confidence: high
    friction_hints:
      - "4–6 hours outdoors pre-game"
      - "sun + sweat + smoke from grills + grass dust"
      - "alcohol → dehydration → skin barrier compromise"
    keywords: [tailgate, NFL, gameday, fans]

  - name: "Super Bowl Sunday"
    date_pattern: "second Sunday of February"
    confidence: high
    friction_hints:
      - "indoor party-prep beauty moment for hosts"
      - "halftime-show-inspired makeup looks trending"
    keywords: [Super Bowl, halftime, party, gameday]

# ─────────────────────────────────────────────────────────────────────────────
# Bama Rush + Greek Life — sorority recruitment week.
# Verify exact dates each year via University of Alabama academic calendar.
# Trends are on TikTok months in advance; the actual week is the peak.
# ─────────────────────────────────────────────────────────────────────────────

bama_rush:
  - name: "#BamaRush primary recruitment week"
    date_pattern: "approximately mid-August (week before fall semester at U. of Alabama)"
    confidence: medium
    friction_hints:
      - "12+ hour outdoor lineups in Alabama August heat (32–37°C, 80%+ humidity)"
      - "full makeup expected to last all day"
      - "shower-prep stress + hard-water film amplifying skin issues"
      - "hairstyling heat damage from repeated styling"
    keywords: [BamaRush, sorority, rush week, OOTD, recruitment]

  - name: "Generalized US Greek life rush (fall and spring)"
    date_pattern: "fall: August/September, spring: January/February"
    confidence: medium
    friction_hints:
      - "varies by school; pattern similar to Bama but less extreme heat in fall-only schools"
    keywords: [rush week, sorority, fraternity, Greek life]

# ─────────────────────────────────────────────────────────────────────────────
# Marathons — long outdoor exertion + post-race recovery friction.
# Source for verification: official race websites.
# ─────────────────────────────────────────────────────────────────────────────

marathons:
  - name: "Boston Marathon"
    date_pattern: "Patriots' Day, third Monday of April"
    confidence: high
    friction_hints:
      - "spring weather variability — can be 4°C and rainy or 25°C and humid"
      - "post-race wind/sun-burn"
      - "salt residue from sweat irritating sensitive skin"
    keywords: [Boston Marathon, marathon, race day, runners]

  - name: "TCS New York City Marathon"
    date_pattern: "first Sunday of November"
    confidence: high
    friction_hints:
      - "5 borough course; cold-then-warming morning"
      - "spectator long outdoor day in November chill"
    keywords: [NYC Marathon, marathon, race day, spectator]

  - name: "Bank of America Chicago Marathon"
    date_pattern: "early-to-mid October"
    confidence: high
    friction_hints:
      - "fall weather; lake-effect wind"
      - "long runner training cycle peaks in September"
    keywords: [Chicago Marathon, marathon, training, fall running]

# ─────────────────────────────────────────────────────────────────────────────
# Festival season — outdoor, high-UV, multi-day camping or attendance.
# ─────────────────────────────────────────────────────────────────────────────

festivals:
