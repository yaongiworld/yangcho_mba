# ─────────────────────────────────────────────────────────────────────────────

marathons:
  - name: "Boston Marathon"
    date_pattern: "Patriots' Day, third Monday of April"
    confidence: high
    friction_hints:
      - "spring weather variability — can be 4°C and rainy or 25°C and humid"
      - "post-race wind/sun-burn"
      - "salt residue from sweat irritating sensitive skin"
